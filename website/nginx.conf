server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  include /etc/nginx/mime.types;
  types {
    text/markdown md;
    text/plain txt;
  }

  location / {
    try_files $uri $uri/ $uri.md =404;
  }

  location ~* \.(css|js|png|jpg|jpeg|webp|svg|ico|xml|txt|md|webmanifest)$ {
    add_header Cache-Control "public, max-age=3600";
    try_files $uri =404;
  }
}
